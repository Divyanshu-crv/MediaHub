<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MediaHub</title>

    <link rel="icon" href="favicon.ico">

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet" href="css/responsive.css">

    <link rel="stylesheet" href="css/animations.css">

</head>

<body>

    <!-- =========================
            LOADING SCREEN
    ========================== -->

    <div id="loadingScreen">

        <h1>🎵 MediaHub</h1>

        <p>Loading...</p>

    </div>



    <!-- =========================
            MAIN APPLICATION
    ========================== -->

    <div id="app">

        <!-- =========================
                HEADER
        ========================== -->

        <header>

            <div class="logo">

                <h1>🎵 MediaHub</h1>

                <p>Your Personal Media Library</p>

            </div>

            <div class="headerButtons">

                <button id="themeButton">

                    🌙 Theme

                </button>

                <button id="aboutButton">

                    ℹ About

                </button>

            </div>

        </header>



        <!-- =========================
                SEARCH
        ========================== -->

        <section id="searchSection">

            <input

                id="searchInput"

                type="text"

                placeholder="Search Songs, Friends, Categories or ID..."

            >

        </section>



        <!-- =========================
                DASHBOARD
        ========================== -->

        <section id="dashboardSection">

            <h2>

                📊 Dashboard

            </h2>

            <div id="statisticsContainer">

            </div>

        </section>



        <!-- =========================
                FRIENDS
        ========================== -->

        <section id="friendsSection">

            <div class="sectionHeader">

                <h2>

                    👤 Friends

                </h2>

            </div>

            <div id="friendsContainer">

            </div>

        </section>



        <!-- =========================
                FRIEND PROFILE
        ========================== -->

        <section id="friendProfileSection">

        </section>



        <!-- =========================
                MEDIA
        ========================== -->

        <section id="mediaSection">

            <div class="sectionHeader">

                <h2>

                    🎵 Media

                </h2>

            </div>

            <div id="songsContainer">

            </div>

        </section>



        <!-- =========================
                EMPTY STATE
        ========================== -->

        <section id="emptyState">

        </section>



        <!-- =========================
                FOOTER
        ========================== -->

        <footer>

            <p>

                Made with ❤️ by Divyanshu

            </p>

        </footer>

    </div>



    <!-- =========================
            JAVASCRIPT
    ========================== -->

<script src="js/config.js"></script>
<script src="js/data.js"></script>
<script src="js/helpers.js"></script>
<script src="js/storage.js"></script>
<script src="js/search.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>

</body>

</html>
