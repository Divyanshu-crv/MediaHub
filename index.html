<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MediaHub</title>


    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet" href="css/responsive.css">

    <link rel="stylesheet" href="css/animations.css">


</head>


<body>


    <div id="loadingScreen">

        <h1>🎵 MediaHub</h1>

        <p>Loading...</p>

    </div>



    <div id="app">


        <header>


            <div class="logo">


                <h1>🎵 MediaHub</h1>

                <p>Your Personal Media Library</p>


            </div>


            <div class="headerButtons">


                <button id="themeButton">

                    🌙 Theme

                </button>


                <button id="aboutButton">

                    ℹ About

                </button>


            </div>


        </header>



        <!-- ==========================
        HERO SECTION
========================== -->


        <section id="heroSection">


            <div class="heroContent">


                <h1>

                    Welcome to MediaHub 🎵

                </h1>


                <p>

                    Your collection of songs, friends and memories in one place.

                </p>



                <div class="heroStats">


                    <div>

                        <h2 id="heroFriends">

                            0

                        </h2>

                        <p>Friends</p>

                    </div>



                    <div>

                        <h2 id="heroSongs">

                            0

                        </h2>

                        <p>Songs</p>

                    </div>



                    <div>

                        <h2 id="heroFavorites">

                            0

                        </h2>

                        <p>Favorites</p>

                    </div>



                </div>



                <button onclick="heroExplore()">

                    ▶ Explore Music

                </button>


            </div>


        </section>


       <section id="searchSection">

    <input
        id="searchInput"
        type="text"
        placeholder="Search Songs, Friends, Categories..."
        autocomplete="off"
    >

    <div id="searchSuggestions"></div>

</section>





        <section id="dashboardSection">


            <h2>

                📊 Dashboard

            </h2>


            <div id="statisticsContainer">


            </div>


        </section>





        <section id="friendsSection">


            <div class="sectionHeader">


                <h2>

                    👤 Friends

                </h2>


            </div>


            <div id="friendsContainer">


            </div>


        </section>





        <section id="friendProfileSection">


        </section>





<section id="mediaSection">

    <div class="sectionHeader">

        <h2>🎵 Media Library</h2>

    </div>

    <div id="categoryContainer"></div>   <!-- NEW -->

    <div id="songsContainer"></div>

</section>





        <section id="emptyState">


        </section>





        <footer>


            <p>

                Made with ❤️ by Divyanshu

            </p>


        </footer>




    </div>





    <script src="js/config.js"></script>

    <script src="js/data.js"></script>

    <script src="js/helpers.js"></script>

    <script src="js/storage.js"></script>

    <script src="js/search.js"></script>

    <script src="js/ui.js"></script>

    <script src="js/app.js"></script>


</body>

</html>
